<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portas Abertas 2026 - Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-root">
      <canvas id="game-canvas" width="960" height="540" aria-label="Top-down action game"></canvas>
      <section class="hud" aria-live="polite">
        <div>HP: <span id="hp-value">0</span></div>
        <div>Damage: <span id="damage-value">0</span></div>
        <div>Gold: <span id="gold-value">0</span></div>
        <div>Time: <span id="time-value">0.0</span>s</div>
      </section>
      <section id="upgrade-menu" class="upgrade-menu hidden" aria-label="Upgrade menu">
        <h1>You were defeated</h1>
        <p>Spend gold on permanent upgrades and restart.</p>
        <div class="upgrade-buttons">
          <button id="upgrade-health" type="button">+5 Max HP (cost: 10)</button>
          <button id="upgrade-damage" type="button">+1 Damage (cost: 10)</button>
          <button id="upgrade-speed" type="button">+0.15 Speed (cost: 10)</button>
        </div>
        <button id="restart-run" type="button">Restart Run</button>
      </section>
    </main>

    <script type="module" src="src/game.js"></script>
  </body>
</html>
